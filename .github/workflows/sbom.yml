name: SBOM Generation

on:
  push:
    branches: [ main ]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: windows-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install CycloneDX CLI
        run: npm install -g @cyclonedx/cyclonedx-npm
      
      - name: Generate CycloneDX SBOM
        run: cyclonedx-npm --output-file sbom.json --output-format JSON
      
      - name: Generate CycloneDX SBOM (XML)
        run: cyclonedx-npm --output-file sbom.xml --output-format XML
      
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml
          retention-days: 90
      
      - name: Commit SBOM to repository
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sbom.json sbom.xml
          git diff --staged --quiet || git commit -m "chore: update SBOM [skip ci]"
          git push

